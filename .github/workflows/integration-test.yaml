name: Nightly Integration Tests

permissions:
  contents: read
  id-token: write  # Required for OIDC authentication with AWS

on:
  # Nightly build - runs daily at 2 AM UTC
  # schedule:
    # - cron: '0 2 * * *'  # Daily at 2 AM UTC
  
  # Allow manual triggering
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      deployment-base: ${{ steps.set-matrix.outputs.deployment-base }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: pip install pyyaml
      
      - name: Validate integration test configuration
        run: python3 .github/scripts/validate_integration_config.py
      
      - name: Generate test matrix
        id: set-matrix
        run: |
          python3 .github/scripts/generate_test_matrix.py --tier nightly --format github >> $GITHUB_OUTPUT

  build-ak-py:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: pip install uv

      - name: Build ak-py
        working-directory: ak-py
        run: ./build.sh

      - name: Cache ak-py build
        uses: actions/cache/save@v4
        with:
          path: ak-py/dist
          key: ak-py-${{ github.sha }}

  deploy-openai: # This is handled separately because this module deploys supporting infrastructure for other tests
    needs: [build-ak-py]
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -e {0}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install uv pyyaml

      - name: Restore ak-py build
        uses: actions/cache/restore@v4
        with:
          path: ak-py/dist
          key: ak-py-${{ github.sha }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/${{ vars.AWS_ROLE_NAME }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.5

      - name: Inject dependencies
        run: python3 scripts/deploy/inject_dependencies.py

      - name: Deploy and test aws-serverless/openai
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TF_VAR_openai_api_key: ${{ secrets.OPENAI_API_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_SIGNING_SECRET: ${{ secrets.SLACK_SIGNING_SECRET }}
          AK_TEST_SLACK_CHANNEL_ID: ${{ secrets.AK_TEST_SLACK_CHANNEL_ID }}
        run: |
          # Deploy
          python .github/scripts/run_single_test.py \
            --type aws-serverless \
            --path examples/aws-serverless/openai \
            --deploy-dir deploy \
            --action deploy
          
          # Test
          python .github/scripts/run_single_test.py \
            --type aws-serverless \
            --path examples/aws-serverless/openai \
            --deploy-dir deploy \
            --action test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-openai
          path: |
            examples/aws-serverless/openai/**/test-results/
            examples/aws-serverless/openai/**/pytest-report.xml
          retention-days: 30

  run-tests:
    needs: [setup, deploy-openai]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}
    defaults:
      run:
        shell: bash -e {0}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install uv pyyaml

      - name: Restore ak-py build
        uses: actions/cache/restore@v4
        with:
          path: ak-py/dist
          key: ak-py-${{ github.sha }}

      - name: Configure AWS credentials
        if: matrix.type == 'aws-containerized' || matrix.type == 'aws-serverless'  || matrix.requires_aws == true
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/${{ vars.AWS_ROLE_NAME }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Setup Terraform
        if: matrix.type == 'aws-containerized' || matrix.type == 'aws-serverless'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.5

      - name: Inject dependencies
        if: matrix.type == 'aws-containerized' || matrix.type == 'aws-serverless'
        run: python3 scripts/deploy/inject_dependencies.py

      - name: Restore Gmail token
        if: matrix.path == 'examples/api/gmail'
        run: echo "${{ secrets.AK_GMAIL_TOKEN_PICKLE_B64 }}" | base64 -d > examples/api/gmail/token.pickle

      - name: Run Test - ${{ matrix.path }}
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TF_VAR_openai_api_key: ${{ secrets.OPENAI_API_KEY }}
          # Slack
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_SIGNING_SECRET: ${{ secrets.SLACK_SIGNING_SECRET }}
          AK_TEST_SLACK_CHANNEL_ID: ${{ secrets.AK_TEST_SLACK_CHANNEL_ID }}
          # Telegram
          AK_TELEGRAM__BOT_TOKEN: ${{ secrets.AK_TELEGRAM__BOT_TOKEN }}
          AK_TELEGRAM__WEBHOOK_SECRET: ${{ secrets.AK_TELEGRAM__WEBHOOK_SECRET }}
          AK_TEST_TELEGRAM_CHAT_ID: ${{ secrets.AK_TEST_TELEGRAM_CHAT_ID }}
          # WhatsApp
          AK_WHATSAPP__ACCESS_TOKEN: ${{ secrets.AK_WHATSAPP__ACCESS_TOKEN }}
          AK_WHATSAPP__PHONE_NUMBER_ID: ${{ secrets.AK_WHATSAPP__PHONE_NUMBER_ID }}
          AK_WHATSAPP__VERIFY_TOKEN: ${{ secrets.AK_WHATSAPP__VERIFY_TOKEN }}
          AK_TEST_WHATSAPP_TO_NUMBER: ${{ secrets.AK_TEST_WHATSAPP_TO_NUMBER }}
          # Messenger
          AK_MESSENGER__ACCESS_TOKEN: ${{ secrets.AK_MESSENGER__ACCESS_TOKEN }}
          AK_MESSENGER__VERIFY_TOKEN: ${{ secrets.AK_MESSENGER__VERIFY_TOKEN }}
          AK_MESSENGER__APP_SECRET: ${{ secrets.AK_MESSENGER__APP_SECRET }}
          AK_TEST_MESSENGER_USER_ID: ${{ secrets.AK_TEST_MESSENGER_USER_ID }}
          AK_MESSENGER__PAGE_ID: ${{ secrets.AK_MESSENGER__PAGE_ID }}
          # Instagram
          AK_INSTAGRAM__ACCESS_TOKEN: ${{ secrets.AK_INSTAGRAM__ACCESS_TOKEN }}
          AK_INSTAGRAM__VERIFY_TOKEN: ${{ secrets.AK_INSTAGRAM__VERIFY_TOKEN }}
          AK_INSTAGRAM__APP_SECRET: ${{ secrets.AK_INSTAGRAM__APP_SECRET }}
          AK_TEST_INSTAGRAM_USER_ID: ${{ secrets.AK_TEST_INSTAGRAM_USER_ID }}
          AK_INSTAGRAM__PAGE_ID: ${{ secrets.AK_INSTAGRAM__PAGE_ID }}
          # Gmail
          AK_TEST_GMAIL_ADDRESS: ${{ secrets.AK_TEST_GMAIL_ADDRESS }}
          AK_GMAIL__CLIENT_ID: ${{ secrets.AK_GMAIL__CLIENT_ID }}
          AK_GMAIL__CLIENT_SECRET: ${{ secrets.AK_GMAIL__CLIENT_SECRET }}
          # Teams
          AK_TEAMS__APP_ID: ${{ secrets.AK_TEAMS__APP_ID }}
          AK_TEAMS__APP_PASSWORD: ${{ secrets.AK_TEAMS__APP_PASSWORD }}
          AK_TEAMS__TENANT_ID: ${{ secrets.AK_TEAMS__TENANT_ID }}
          AK_TEST_TEAMS_SERVICE_URL: ${{ secrets.AK_TEST_TEAMS_SERVICE_URL }}
          AK_TEST_TEAMS_CONVERSATION_ID: ${{ secrets.AK_TEST_TEAMS_CONVERSATION_ID }}
        run: |
          # Deploy (for AWS types)
          if [[ "${{ matrix.type }}" == "aws-containerized" || "${{ matrix.type }}" == "aws-serverless" ]]; then
            python .github/scripts/run_single_test.py \
              --type ${{ matrix.type }} \
              --path ${{ matrix.path }} \
              --deploy-dir ${{ matrix.deploy_dir }} \
              --action deploy
          fi
          
          # Test
          python .github/scripts/run_single_test.py \
            --type ${{ matrix.type }} \
            --path ${{ matrix.path }} \
            --deploy-dir ${{ matrix.deploy_dir }} \
            --action test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.id }}
          path: |
            ${{ matrix.path }}/**/test-results/
            ${{ matrix.path }}/**/pytest-report.xml
          retention-days: 30
