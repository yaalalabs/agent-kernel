name: Nightly Integration Tests

on:
  # Nightly build - runs daily at 2 AM UTC
  # schedule:
    # - cron: '0 2 * * *'  # Daily at 2 AM UTC
  
  # Allow manual triggering
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Generate test matrix
        id: set-matrix
        run: |
          # Read config and generate matrix, excluding aws-serverless/openai
          python3 -c "
          import yaml
          import json
          
          with open('.github/integration-test-config.yaml', 'r') as f:
              config = yaml.safe_load(f)
          
          tests = config['nightly']['tests']
          matrix_tests = []
          
          for idx, test in enumerate(tests):
              # Skip aws-serverless/openai as it runs first separately
              if test['path'] == 'examples/aws-serverless/openai':
                  continue
              matrix_tests.append({
                  'id': idx,
                  'type': test['type'],
                  'path': test['path'],
                  'deploy_dir': test.get('deploy_dir', 'deploy')
              })
          
          print(json.dumps({'include': matrix_tests}))
          " > matrix.json
          
          echo "matrix=$(cat matrix.json)" >> $GITHUB_OUTPUT

  build-ak-py:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: pip install uv

      - name: Build ak-py
        working-directory: ak-py
        run: ./build.sh

      - name: Cache ak-py build
        uses: actions/cache/save@v4
        with:
          path: ak-py/dist
          key: ak-py-${{ github.sha }}

  deploy-openai:
    needs: [build-ak-py]
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -e {0}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install uv pyyaml

      - name: Restore ak-py build
        uses: actions/cache/restore@v4
        with:
          path: ak-py/dist
          key: ak-py-${{ github.sha }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/${{ vars.AWS_ROLE_NAME }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.5

      - name: Deploy and test aws-serverless/openai
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python .github/scripts/run_single_test.py \
            --type aws-serverless \
            --path examples/aws-serverless/openai \
            --deploy-dir deploy \
            --action test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-openai
          path: |
            examples/aws-serverless/openai/**/test-results/
            examples/aws-serverless/openai/**/pytest-report.xml
          retention-days: 30

  run-tests:
    needs: [setup, deploy-openai]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}
    defaults:
      run:
        shell: bash -e {0}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install uv pyyaml

      - name: Restore ak-py build
        uses: actions/cache/restore@v4
        with:
          path: ak-py/dist
          key: ak-py-${{ github.sha }}

      - name: Configure AWS credentials
        if: matrix.type == 'aws-containerized' || matrix.type == 'aws-serverless'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/${{ vars.AWS_ROLE_NAME }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Setup Terraform
        if: matrix.type == 'aws-containerized' || matrix.type == 'aws-serverless'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.5

      - name: Run Test - ${{ matrix.path }}
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python .github/scripts/run_single_test.py \
            --type ${{ matrix.type }} \
            --path ${{ matrix.path }} \
            --deploy-dir ${{ matrix.deploy_dir }} \
            --action test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.id }}
          path: |
            ${{ matrix.path }}/**/test-results/
            ${{ matrix.path }}/**/pytest-report.xml
          retention-days: 30
