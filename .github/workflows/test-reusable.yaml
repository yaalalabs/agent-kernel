name: Reusable Test Workflow

# This is a reusable workflow that contains all the test jobs
# It can be called by other workflows with different triggers and contexts

on:
  workflow_call:
    inputs:
      ref:
        description: 'Git ref to checkout'
        required: false
        type: string
        default: ''
      run_e2e_tests:
        description: 'Whether to run e2e tests (requires secrets)'
        required: false
        type: boolean
        default: true
    secrets:
      APP_ID:
        required: false
      APP_PRIVATE_KEY:
        required: false
      OPENAI_API_KEY:
        required: false
      SLACK_BOT_TOKEN:
        required: false
      SLACK_SIGNING_SECRET:
        required: false

jobs:
  unit-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -e {0}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: |
          pip install uv
      
      - name: Test bump_version scripts
        run: |
          python scripts/test_bump_version.py
          python scripts/test_update_terraform_versions.py

      - name: Build and test ak-py
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        working-directory: ak-py
        run: |
          set -e
          ./build.sh
          uv run pytest -s

  cli-e2e-test:
    if: ${{ inputs.run_e2e_tests }}
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -e {0}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: |
          pip install uv

      - name: Build ak-py
        working-directory: ak-py
        run: |
          set -e
          ./build.sh

      - name: Run CLI examples
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          set -e
          for example in examples/cli/* examples/cli/a2a/*; do
            if [ -d "$example" ] && [ -f "$example/build.sh" ]; then
              echo "=== Running build for $example ==="
              (cd "$example" && ./build.sh local)
              echo "=== Running tests for $example ==="
              (cd "$example" && uv run pytest -s)
            fi
          done

  api-e2e-test:
    if: ${{ inputs.run_e2e_tests }}
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -e {0}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: |
          pip install uv

      - name: Build ak-py
        working-directory: ak-py
        run: |
          set -e
          ./build.sh

      - name: Run API examples
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_SIGNING_SECRET: ${{ secrets.SLACK_SIGNING_SECRET }}
        run: |
          set -e
          for example in examples/api/* examples/api/a2a/* examples/api/mcp/*; do
            if [ -d "$example" ] && [ -f "$example/build.sh" ]; then
              echo "=== Running build for $example ==="
              (cd "$example" && ./build.sh local)
              echo "=== Running tests for $example ==="
              (cd "$example" && uv run pytest -s)
            fi
          done
          
      - name: Run Memory examples
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          set -e
          for example in examples/memory/* ; do
            if [ -d "$example" ] && [ -f "$example/build.sh" ] && [ -f "$example/app_test.py" ]; then
              echo "=== Running build for $example ==="
              (cd "$example" && ./build.sh local)
              echo "=== Running tests for $example ==="
              (cd "$example" && uv run pytest -s)
            fi
          done

  containerized-e2e-test:
    if: ${{ inputs.run_e2e_tests }}
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -e {0}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: |
          pip install uv

      - name: Build ak-py
        working-directory: ak-py
        run: |
          set -e
          ./build.sh

      - name: Run Containerized Examples
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          set -e
          for example in examples/containerized/* examples/containerized/a2a/*; do
            if [ -d "$example" ] && [ -f "$example/build.sh" ]; then
              echo "=== Running build for $example ==="
              (cd "$example" && ./build.sh local)
              echo "=== Running tests for $example ==="
              (cd "$example" && uv run pytest -s)
            fi
          done
