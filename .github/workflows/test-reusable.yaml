name: Reusable Test Workflow

# This is a reusable workflow that contains all the test jobs
# It can be called by other workflows with different triggers and contexts

permissions:
  contents: read

on:
  workflow_call:
    inputs:
      checkout_ref:
        description: 'The git ref to checkout (commit SHA, branch, or tag)'
        required: true
        type: string
      run_e2e_tests:
        description: 'Whether to run e2e tests (requires secrets)'
        required: false
        type: boolean
        default: true
      enable_cache:
        description: 'Whether to enable build cache save/restore steps'
        required: false
        type: boolean
        default: true
    secrets:
      APP_ID:
        required: false
      APP_PRIVATE_KEY:
        required: false
      OPENAI_API_KEY:
        required: false
      WALLED_API_KEY:
        required: false
      SLACK_BOT_TOKEN:
        required: false
      SLACK_SIGNING_SECRET:
        required: false

jobs:
  setup:
    if: ${{ inputs.run_e2e_tests }}
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.checkout_ref }}
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: pip install pyyaml
      
      - name: Generate test matrix
        id: set-matrix
        run: |
          python3 .github/scripts/generate_test_matrix.py --tier e2e --format github >> $GITHUB_OUTPUT

  build-ak-py:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.checkout_ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: pip install uv

      - name: Build ak-py
        working-directory: ak-py
        run: ./build.sh

      - name: Cache ak-py build
        if: ${{ inputs.enable_cache && inputs.checkout_ref == github.sha }}
        uses: actions/cache/save@v4
        with:
          path: ak-py/dist
          key: ak-py-${{ inputs.checkout_ref }}

  script-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -e {0}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.checkout_ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Test bump_version script
        working-directory: scripts
        run: python test_bump_version.py
      
      - name: Test update_terraform_versions script
        working-directory: scripts
        run: python test_update_terraform_versions.py

      - name: Test update_skills_version script
        working-directory: scripts
        run: python test_update_skills_version.py

  unit-tests:
    needs: [build-ak-py]
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -e {0}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.checkout_ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: pip install uv

      - name: Restore ak-py build
        if: ${{ inputs.enable_cache && inputs.checkout_ref == github.sha }}
        uses: actions/cache/restore@v4
        with:
          path: ak-py/dist
          key: ak-py-${{ inputs.checkout_ref }}

      - name: Test ak-py
        working-directory: ak-py
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: ./build.sh && uv run pytest -s

  e2e-tests:
    needs: [setup, build-ak-py]
    if: ${{ inputs.run_e2e_tests && fromJson(needs.setup.outputs.matrix).include[0] != null }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}
    defaults:
      run:
        shell: bash -e {0}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.checkout_ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: pip install uv

      - name: Restore ak-py build
        if: ${{ inputs.enable_cache }}
        uses: actions/cache/restore@v4
        with:
          path: ak-py/dist
          key: ak-py-${{ inputs.checkout_ref }}

      - name: Run test - ${{ matrix.path }}
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          WALLED_API_KEY: ${{ secrets.WALLED_API_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_SIGNING_SECRET: ${{ secrets.SLACK_SIGNING_SECRET }}
        run: |
          python .github/scripts/run_single_test.py \
            --type ${{ matrix.type }} \
            --path ${{ matrix.path }} \
            --action test

