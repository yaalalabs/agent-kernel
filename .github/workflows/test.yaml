name: Test

on:
  pull_request:
  push:
    branches:
      - develop
  workflow_dispatch:
    inputs:
      update_example_locks:
        description: 'Update example lock files before testing'
        required: false
        type: boolean
        default: false

jobs:
  update-lock-files:
    if: ${{ github.event.inputs.update_example_locks == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -e {0}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: |
          pip install uv

      - name: Update example lock files
        run: |
          python scripts/update_examples_version.py --force-lock

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add examples/**/uv.lock
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update example lock files [skip ci]"
            git push
          fi

  unit-test:
    needs: [update-lock-files]
    if: ${{ always() && (needs.update-lock-files.result == 'success' || needs.update-lock-files.result == 'skipped') }}
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -e {0}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: |
          pip install uv
      
      - name: Test bump_version script
        run: |
          python scripts/test_bump_version.py

      - name: Build and test ak-py
        working-directory: ak-py
        run: |
          set -e
          ./build.sh
          uv run pytest -s

  cli-e2e-test:
    needs: [update-lock-files]
    if: ${{ always() && (needs.update-lock-files.result == 'success' || needs.update-lock-files.result == 'skipped') }}
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -e {0}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: |
          pip install uv

      - name: Build ak-py
        working-directory: ak-py
        run: |
          set -e
          ./build.sh

      - name: Run CLI examples
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          set -e
          for example in examples/cli/* examples/cli/a2a/*; do
            if [ -d "$example" ] && [ -f "$example/build.sh" ]; then
              echo "=== Running build for $example ==="
              (cd "$example" && ./build.sh local)
              echo "=== Running tests for $example ==="
              (cd "$example" && uv run pytest -s)
            fi
          done

  api-e2e-test:
    needs: [update-lock-files]
    if: ${{ always() && (needs.update-lock-files.result == 'success' || needs.update-lock-files.result == 'skipped') }}
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -e {0}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: |
          pip install uv

      - name: Build ak-py
        working-directory: ak-py
        run: |
          set -e
          ./build.sh

      - name: Run API examples
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          set -e
          for example in examples/api/* examples/api/a2a/* examples/api/mcp/*; do
            if [ -d "$example" ] && [ -f "$example/build.sh" ]; then
              echo "=== Running build for $example ==="
              (cd "$example" && ./build.sh local)
              echo "=== Running tests for $example ==="
              (cd "$example" && uv run pytest -s)
            fi
          done

  containerized-e2e-test:
    needs: [update-lock-files]
    if: ${{ always() && (needs.update-lock-files.result == 'success' || needs.update-lock-files.result == 'skipped') }}
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -e {0}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: |
          pip install uv

      - name: Build ak-py
        working-directory: ak-py
        run: |
          set -e
          ./build.sh

      - name: Run Containerized Examples
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          set -e
          for example in examples/containerized/* examples/containerized/a2a/*; do
            if [ -d "$example" ] && [ -f "$example/build.sh" ]; then
              echo "=== Running build for $example ==="
              (cd "$example" && ./build.sh local)
              echo "=== Running tests for $example ==="
              (cd "$example" && uv run pytest -s)
            fi
          done