name: Test

on:
  pull_request:
  push:
    branches:
      - develop

jobs:
  unit-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -e {0}
    steps:
      - name: Setup Python and uv
        uses: ./.github/actions/setup-python-uv

      - name: Build ak-py
        uses: ./.github/actions/build-ak-py

      - name: Test ak-py
        working-directory: ak-py
        run: |
          uv run pytest -s

  cli-e2e-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -e {0}
    steps:
      - name: Setup Python and uv
        uses: ./.github/actions/setup-python-uv

      - name: Build ak-py
        uses: ./.github/actions/build-ak-py

      - name: Run CLI examples
        uses: ./.github/actions/run-examples
        with:
          example-paths: 'examples/cli/* examples/cli/a2a/*'
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}

  api-e2e-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -e {0}
    steps:
      - name: Setup Python and uv
        uses: ./.github/actions/setup-python-uv

      - name: Build ak-py
        uses: ./.github/actions/build-ak-py

      - name: Run API examples
        uses: ./.github/actions/run-examples
        with:
          example-paths: 'examples/api/* examples/api/a2a/*'
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
