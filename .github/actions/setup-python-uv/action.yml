name: 'Setup Python and uv'
description: 'Common setup steps for Python projects with uv'
inputs:
  python-version:
    description: 'Python version to setup'
    required: false
    default: '3.12'
runs:
  using: 'composite'
  steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install uv
      shell: bash
      run: |
        pip install uv