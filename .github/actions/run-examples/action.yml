name: 'Run Examples'
description: 'Run examples with build and test steps'
inputs:
  example-paths:
    description: 'Space-separated list of example directory patterns to run'
    required: true
  openai-api-key:
    description: 'OpenAI API key for running examples'
    required: false
runs:
  using: 'composite'
  steps:
    - name: Run Examples
      shell: bash
      env:
        OPENAI_API_KEY: ${{ inputs.openai-api-key }}
      run: |
        set -e
        for example in ${{ inputs.example-paths }}; do
          if [ -d "$example" ] && [ -f "$example/build.sh" ]; then
            echo "=== Running build for $example ==="
            (cd "$example" && ./build.sh local)
            echo "=== Running tests for $example ==="
            (cd "$example" && uv run pytest -s)
          fi
        done