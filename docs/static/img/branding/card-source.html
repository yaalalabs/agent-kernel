<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    background: #0D001A;
    font-family: 'Ubuntu Sans', 'Ubuntu', system-ui, sans-serif;
  }

  .card {
    position: relative;
    width: 1200px;
    height: 630px;
    background: #0D001A;
    overflow: hidden;
  }

  /* Grid texture */
  .grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,221,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,221,255,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  /* Glows */
  .glow-a {
    position: absolute;
    top: -160px; left: -100px;
    width: 620px; height: 620px;
    background: radial-gradient(ellipse, rgba(0,221,255,0.16) 0%, transparent 65%);
  }
  .glow-b {
    position: absolute;
    bottom: -180px; right: -100px;
    width: 560px; height: 560px;
    background: radial-gradient(ellipse, rgba(242,0,255,0.13) 0%, transparent 65%);
  }

  /* Thin border */
  .border {
    position: absolute;
    inset: 0;
    border: 1px solid rgba(0,221,255,0.15);
    pointer-events: none;
  }

  /* ── Badge ── */
  .badge {
    position: absolute;
    top: 52px; left: 72px;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(0,221,255,0.1);
    border: 1px solid rgba(0,221,255,0.25);
    border-radius: 999px;
    padding: 6px 16px 6px 10px;
  }
  .badge-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #00DDFF;
    box-shadow: 0 0 12px rgba(0,221,255,0.95);
    flex-shrink: 0;
  }
  .badge-text {
    font-family: 'DejaVu Sans Mono', 'Liberation Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    color: #00DDFF;
    letter-spacing: 0.07em;
    text-transform: uppercase;
  }

  /* ── Headline ── */
  .headline {
    position: absolute;
    top: 130px; left: 72px;
    width: 760px;
    font-size: 56px;
    font-weight: 800;
    letter-spacing: -1.5px;
    line-height: 1.08;
    color: #E8E4F0;
  }
  .headline em {
    font-style: normal;
    background: linear-gradient(135deg, #00DDFF 0%, #F200FF 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  /* ── Subline ── */
  .subline {
    position: absolute;
    top: 380px; left: 72px;
    width: 520px;
    font-size: 19px;
    color: #9085AD;
    line-height: 1.5;
    font-weight: 400;
  }

  /* ── Icon (Agent Kernel mark) ── */
  .icon {
    position: absolute;
    right: 100px;
    top: 50%;
    transform: translateY(-50%);
  }
  .icon-glow {
    position: absolute;
    inset: -50px;
    border-radius: 50%;
    background: radial-gradient(ellipse, rgba(0,221,255,0.22) 0%, rgba(242,0,255,0.08) 50%, transparent 70%);
  }
  .icon svg { display: block; position: relative; }

  /* ── Footer ── */
  .footer {
    position: absolute;
    left: 72px; right: 72px;
    bottom: 44px;
    display: flex;
    align-items: center;
    gap: 10px;
    padding-top: 18px;
    border-top: 1px solid rgba(255,255,255,0.08);
  }
  .pill {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 6px;
    padding: 6px 13px;
    font-family: 'DejaVu Sans Mono', 'Liberation Mono', monospace;
    font-size: 12.5px;
    font-weight: 600;
    color: #9A91B8;
  }
  .sep {
    width: 3px; height: 3px;
    border-radius: 50%;
    background: #3a1f4a;
    flex-shrink: 0;
  }
  .url {
    margin-left: auto;
    font-family: 'DejaVu Sans Mono', 'Liberation Mono', monospace;
    font-size: 13px;
    color: #6B5F85;
    letter-spacing: 0.03em;
  }
</style>
</head>
<body>
<div class="card">
  <div class="grid"></div>
  <div class="glow-a"></div>
  <div class="glow-b"></div>
  <div class="border"></div>

  <!-- Badge -->
  <div class="badge">
    <div class="badge-dot"></div>
    <span class="badge-text">Open Source · Apache 2.0</span>
  </div>

  <!-- Headline -->
  <div class="headline">
    The Operating System<br>
    for Scalable Enterprise<br>
    <em>AI Agents</em>
  </div>

  <!-- Subline -->
  <p class="subline">
    Framework-agnostic. Multi-cloud. Build, test &amp; deploy<br>
    agents to AWS or Azure in days — not months.
  </p>

  <!-- Icon: official Agent Kernel mark -->
  <div class="icon">
    <div class="icon-glow"></div>
    <svg width="260" height="260" viewBox="0 0 581.263 600" xmlns="http://www.w3.org/2000/svg">
      <path fill="#00DDFF" d="M238.569,294.85v34.937l1.906,0.938c21.313,10.656,34.532,32.093,34.532,55.905v13.375
        l-73.186-36.593c-31.75-15.875-51.812-48.343-51.812-83.843v-129.56l73.186,36.593c31.75,15.875,51.812,48.343,51.812,83.843
        v46.312c-6.125-5.469-13-10.187-20.562-13.968L238.569,294.85z"/>
      <path fill="#00DDFF" d="M431.254,150.008v129.56c0,35.5-20.062,67.968-51.812,83.843l-73.186,36.593v-50.749
        c0-23.812,13.218-45.249,34.53-55.905l1.907-0.937v-34.937l-15.875,7.937c-7.562,3.781-14.438,8.5-20.562,13.969v-8.937
        c0-35.5,20.062-67.968,51.812-83.843L431.254,150.008z"/>
      <path fill="#00AADE" d="M306.26,400.027v44.421l-7.028,3.514c-5.422,2.711-11.805,2.707-17.223-0.011l-6.982-3.503v-44.421
        l6.969,3.496c5.426,2.722,11.818,2.722,17.244,0.001l6.971-3.496H306.26z"/>
    </svg>
  </div>

  <!-- Footer -->
  <div class="footer">
    <div class="pill">OpenAI</div>
    <div class="sep"></div>
    <div class="pill">LangGraph</div>
    <div class="sep"></div>
    <div class="pill">CrewAI</div>
    <div class="sep"></div>
    <div class="pill">Google ADK</div>
    <div class="sep"></div>
    <div class="pill">AWS · Azure</div>
    <span class="url">kernel.yaala.ai</span>
  </div>
</div>
</body>
</html>
