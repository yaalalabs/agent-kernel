[build-system]
requires = ["uv_build>=0.8.2,<0.9.0"]
build-backend = "uv_build"

[project]
name = "ak-py"
version = "0.1.0"
description = "Agent Kernel Python Distribution"
readme = "README.md"
requires-python = ">=3.12"
license = { text = "MIT" }
authors = [
    { name = "Yaala Labs", email = "info@yaalalabs.com" }
]

[dependency-groups]
dev = [
    "pytest>=7.0.0",
    "black>=23.0.0",
    "isort>=5.0.0",
    "mypy>=1.0.0",
    "pytest-cov>=6.2.1",
    "pytest-html>=4.1.1",
]


[tool.uv.workspace]
members = [
    "ak-common",
    "ak-core",
    "ak-agents",
    "ak",
    "ak-crewai",
    "ak-openai",
    "ak-aws",
]

[tool.uv.sources]
"ak-common" = { workspace = true }
"ak-core" = { workspace = true }
"ak-agents" = { workspace = true }
"ak" = { workspace = true }
"ak-crewai" = { workspace = true }
"ak-openai" = { workspace = true }
"ak-aws" = { workspace = true }

[tool.uv]
package = false

# Common tool configurations that apply to all packages
[tool.black]
line-length = 88
target-version = ["py312"]

[tool.isort]
profile = "black"
line_length = 88

[tool.mypy]
python_version = "3.12"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_incomplete_defs = true

[tool.pytest.ini_options]
addopts = "--cov=ak-common/src --cov=ak-core/src --cov=ak-agents/src --cov-report=term --cov-report=html --html=report.html"

