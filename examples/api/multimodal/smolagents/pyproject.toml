[project]
name = "api-smolagents-multimodal-example"
version = "0.1.0"
description = "smolagents multimodal example for Agent Kernel"
requires-python = ">=3.12"
dependencies = [
    "agentkernel[api,smolagents,multimodal]>=0.4.0",
    "python-multipart>=0.0.12",
    "smolagents",
]

[dependency-groups]
dev = [
    "agentkernel[test,smolagents]>=0.4.0",
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
    "httpx>=0.27.0",
    "black>=23.0.0",
    "isort>=5.0.0",
]

[tool.uv]
package = false

[tool.isort]
profile = "black"
line_length = 120

[tool.mypy]
python_version = "3.12"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_incomplete_defs = true

[tool.black]
line-length = 120
target-version = ["py312"]
