[project]
name = "api-crewai-multimodal-example"
version = "0.1.0"
description = "CrewAI multimodal example for Agent Kernel"
requires-python = ">=3.12,<3.14"
dependencies = [
    "agentkernel[api,crewai,multimodal]>=0.6.0",
]

[dependency-groups]
dev = [
    "agentkernel[test]>=0.6.0",
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
    "httpx>=0.27.0",
    "black==26.5.1",
    "isort>=5.0.0",
    "mypy>=1.0.0"
]

[tool.uv]
package = false

[tool.isort]
profile = "black"
line_length = 120

[tool.mypy]
python_version = "3.12"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_incomplete_defs = true

[tool.black]
line-length = 120
target-version = ["py312"]
