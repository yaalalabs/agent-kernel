[project]
name = "api-openai-multimodal-example"
version = "0.1.0"
description = "OpenAI multimodal example for Agent Kernel"
requires-python = ">=3.12"
dependencies = [
    "agentkernel[api,openai,cli]>=0.2.13",
    "fastapi>=0.115.0",
    "uvicorn>=0.30.0",
    "python-multipart>=0.0.12"
]

[dependency-groups]
dev = [
    "agentkernel[test]>=0.2.13",
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
    "httpx>=0.27.0"
]

[tool.uv]
package = false
