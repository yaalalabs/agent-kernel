[project]
name = "api-mcp-multi"
version = "0.1.0"
description = "Demo of CrewAI and OpenAI Agents SDK based agents running in Agent Kernel with an API exposed via MCP tools"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "agentkernel[api,crewai,redis,mcp]>=0.4.0",
    
    
]

[dependency-groups]
dev = [
    "agentkernel[test]>=0.4.0",
    "black>=23.0.0",
    "isort>=5.0.0",
    "mypy>=1.0.0",
]

mcp=[
    "openai<1.107.1",
    "openai-agents<=0.3.3",
    "crewai==0.165.1",
]

[tool.uv]
package = false

[tool.isort]
profile = "black"
line_length = 120

[tool.mypy]
python_version = "3.12"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_incomplete_defs = true

[tool.black]
line-length = 120
target-version = ["py312"]