[project]
name = "containerized-openai"
version = "0.1.0"
description = "Demo of OpenAI Agents SDK based agents running in Agent Kernel with a REST API in Docker"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "agentkernel[openai,api]>=0.1.2b24",
]

[tool.uv]
package = false

[project.optional-dependencies]
dev = [
    "agentkernel[test]>=0.1.2b24",
]